phases:
  preflight:
    command: python run.py --profile auto --phase preflight
    writes:
      - results/preflight.json
      - results/environment.txt
  backend_check:
    command: python run.py --profile <selected_profile> --phase backend-check
    requires:
      - preflight
    writes:
      - results/backend_capability.json
    checks:
      - gpu_visible
      - torch_importable
      - vllm_importable
      - huggingface_hub_importable
      - hf_token_present
      - model_repo_metadata_access
      - localhost_port_free
  backend_smoke:
    command: python run.py --profile <selected_profile> --phase backend-smoke
    requires:
      - backend_check
    writes:
      - results/backend_server_smoke.json
      - results/backend_events.jsonl
    checks:
      - local_server_bound_to_127_0_0_1
      - health_endpoint_ok
      - non_streaming_completion_ok
      - streaming_sse_ok
      - ttfc_measured
      - strict_json_tool_call_ok
  model_gate:
    command: python run.py --profile <selected_profile> --phase model-gate
    requires:
      - preflight
      - backend_check
      - backend_smoke
    writes:
      - results/model_gate.json
      - reports/experiment_summary.md
      - reports/experiment_summary.json
    checks:
      - gpu_visible
      - disk_free_above_floor
      - vllm_importable
      - hf_token_present
      - model_repo_metadata_access
      - expected_profile_artifacts_visible
  vllm_setup:
    command: python run.py --profile <selected_profile> --phase vllm-setup
    requires:
      - model_gate
    writes:
      - results/vllm_setup.json
      - reports/experiment_summary.md
      - reports/experiment_summary.json
    checks:
      - gpu_visible_after_install
      - torch_importable_after_install
      - vllm_importable_after_install
      - huggingface_hub_importable_after_install
  artifact_discovery:
    command: python run.py --profile <selected_profile> --phase artifact-discovery
    requires:
      - vllm_setup
      - model_gate
    writes:
      - results/artifact_discovery.json
      - reports/experiment_summary_artifact-discovery.md
      - reports/experiment_summary_artifact-discovery.json
    checks:
      - hf_token_present
      - huggingface_hub_importable
      - candidate_repos_found
      - candidate_files_visible
  smoke:
    command: python run.py --profile <selected_profile> --phase smoke
    requires:
      - preflight
      - backend_check
      - backend_smoke
      - model_gate
    models: [DG-Native, G26-AR, G26-MTP]
    success_gates:
      model_load_success: true
      oom_count: 0
      completion_success_rate_min: 0.90
      json_parse_success_rate_min: 0.50
      peak_vram_fraction_max: 0.92
      server_restart_count: 0
      mtp_mode_verified_for_g26_mtp: true
  pilot:
    command: python run.py --profile <selected_profile> --phase pilot
    speed_scenarios: [S1, S2, S3]
    warmup_requests: 2
    measured_requests: 5
    agent_tasks: 18
    max_agent_turns: 4
  core:
    command: python run.py --profile <selected_profile> --phase core --confirm-go
    speed_scenarios: [S1, S2, S3, S4]
    warmup_requests: 5
    measured_requests: 15
    agent_tasks: 60
    max_agent_turns: 6
    requires_confirm_go: true
  quant_calibration:
    command: python run.py --profile q8_calibration --phase quant-calibration
    requires:
      - successful_core
      - gpu_vram_at_least_48_gib
  bfcl_lite:
    command: python run.py --profile <selected_profile> --phase bfcl-lite --confirm-go
    optional: true
  repeat_speed:
    command: python run.py --profile <selected_profile> --phase repeat-speed
    speed_scenarios: [S2, S3, S4]
    measured_requests: 10

primary_comparison:
  left: DG-Native
  right: G26-MTP
  attribution:
    - G26-AR
  allowed_final_statuses:
    - PRIMARY_NATIVE_OPTIMIZED
    - CONSTRAINED_NATIVE_OPTIMIZED
